<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Điều Phối Trung Tâm // Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 24px; max-width: 1100px; margin: 20px auto; padding: 0 20px; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Hệ Thống Quản Trị <span>Logistics Hub</span></a>
        <a href="index.html" class="action-btn"><i class="fas fa-home"></i> Cửa hàng</a>
    </header>

    <div class="admin-grid">
        <!-- Khu vực đơn hàng -->
        <div>
            <h3 style="font-size:14px; color:var(--ios-text-muted); text-transform:uppercase; margin-bottom:12px; padding-left:5px; font-weight:600;">Lệnh vận tải trực tuyến</h3>
            <div id="admin-orders-list"></div>
        </div>

        <!-- Cài đặt giá kho và thông báo nhanh -->
        <div>
            <div class="form-card" style="margin-bottom: 24px;">
                <h3 style="font-size:14px; color:var(--ios-text-muted); text-transform:uppercase; margin-bottom:12px; font-weight:600;">Kho hàng & Giá tập trung</h3>
                <div id="admin-warehouse-list"></div>
            </div>

            <div class="form-card">
                <h3 style="font-size:14px; color:var(--ios-text-muted); text-transform:uppercase; margin-bottom:12px; font-weight:600;">Phát thông báo khẩn</h3>
                <div class="form-group">
                    <label>Nội dung hiển thị</label>
                    <input type="text" id="notice-input" placeholder="Ví dụ: Bão lớn xe cẩu tạm ngưng hạ cát...">
                </div>
                <div style="display: flex; gap:10px;">
                    <button onclick="saveNotice()" class="action-btn btn-primary" style="flex:1;">Phát tin</button>
                    <button onclick="clearNotice()" class="action-btn" style="color:var(--ios-danger); border-color:rgba(255,59,48,0.2);">Gỡ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        if(localStorage.getItem('currentUser') !== 'Hệ Thống Admin') {
            document.body.innerHTML = `<div style="text-align:center; margin-top:100px; font-family:-apple-system;"><h2>TRUY CẬP KHÔNG HỢP LỆ</h2><p style="color:var(--ios-text-muted);">Tài khoản không đủ thẩm quyền tối cao.</p><br><a href="index.html" class="action-btn">Trở về</a></div>`;
        }

        let orders = JSON.parse(localStorage.getItem('orders')) || [];
        let products = JSON.parse(localStorage.getItem('sysProducts')) || [];

        function renderAdminOrders() {
            const container = document.getElementById('admin-orders-list');
            container.innerHTML = '';

            if(orders.length === 0) {
                container.innerHTML = '<div class="form-card" style="color:var(--ios-text-muted); text-align:center;">Chưa ghi nhận lệnh xe nào.</div>';
                return;
            }

            orders.forEach(o => {
                let statusText = o.status === 'pending' ? 'Chờ xe' : (o.status === 'confirmed' ? 'Đang chở' : 'Đã giao');
                container.innerHTML += `
                    <div class="order-panel-card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <strong style="font-size:16px;">Lệnh: ${o.id}</strong>
                            <span class="status-badge ${o.status}">${statusText}</span>
                        </div>
                        <p style="font-size:12px; color:var(--ios-text-muted); margin-bottom:12px;">Khách: ${o.customer} | Giờ đặt: ${o.time}</p>
                        <div style="font-size:13px; background:var(--ios-bg); padding:10px; border-radius:8px; margin-bottom:12px; border:0.5px solid var(--ios-border);">
                            <i class="fas fa-map-marker-alt" style="color:var(--ios-text-muted);"></i> bãi: <strong>${o.shipping.address}</strong><br>
                            <i class="fas fa-phone" style="color:var(--ios-text-muted); font-size:11px;"></i> LH: ${o.shipping.name} - ${o.shipping.phone}
                        </div>
                        <div>
                            ${o.status === 'pending' ? `<button onclick="updateStatus('${o.id}', 'confirmed')" class="action-btn btn-primary" style="font-size:11px; padding:6px 12px; border-radius:12px;">Duyệt lệnh xuất xe</button>` : ''}
                            ${o.status === 'confirmed' ? `<button onclick="updateStatus('${o.id}', 'completed')" class="action-btn" style="background:var(--ios-success); color:white; border:none; font-size:11px; padding:6px 12px; border-radius:12px;">Đã hạ xong hàng</button>` : ''}
                        </div>
                    </div>
                `;
            });
        }

        function renderAdminWarehouse() {
            const container = document.getElementById('admin-warehouse-list');
            container.innerHTML = '';

            products.forEach(p => {
                container.innerHTML += `
                    <div class="ios-list-item">
                        <span style="font-weight:500; font-size:13px; max-width:50%;">${p.name}</span>
                        <div style="display:flex; gap:8px; align-items:center;">
                            <input type="number" value="${p.price}" onchange="updatePrice('${p.id}', this.value)" style="width:85px; padding:6px; font-size:12px; border-radius:6px; border:none; background:rgba(0,0,0,0.05); text-align:right;">
                            <button onclick="toggleStock('${p.id}')" class="action-btn" style="font-size:11px; padding:6px 10px; border-radius:12px; background:${p.inStock?'rgba(52,199,89,0.1)':'rgba(255,59,48,0.1)'}; color:${p.inStock?'var(--ios-success)':'var(--ios-danger)'}; border:none; box-shadow:none;">
                                ${p.inStock ? 'Còn hàng' : 'Hết'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function updateStatus(id, newStatus) {
            const o = orders.find(item => item.id === id);
            if(o) { o.status = newStatus; localStorage.setItem('orders', JSON.stringify(orders)); renderAdminOrders(); }
        }

        function updatePrice(id, newPrice) {
            const p = products.find(item => item.id === id);
            if(p) { p.price = parseInt(newPrice); localStorage.setItem('sysProducts', JSON.stringify(products)); }
        }

        function toggleStock(id) {
            const p = products.find(item => item.id === id);
            if(p) { p.inStock = !p.inStock; localStorage.setItem('sysProducts', JSON.stringify(products)); renderAdminWarehouse(); }
        }

        function saveNotice() {
            const val = document.getElementById('notice-input').value.trim();
            if(val) { localStorage.setItem('sysAnnouncement', val); alert('Đã phát thông báo!'); }
        }

        function clearNotice() {
            localStorage.removeItem('sysAnnouncement'); document.getElementById('notice-input').value = ''; alert('Đã gỡ bảng tin thành công!');
        }

        document.getElementById('notice-input').value = localStorage.getItem('sysAnnouncement') || '';
        renderAdminOrders();
        renderAdminWarehouse();
    </script>
</body>
</html>
