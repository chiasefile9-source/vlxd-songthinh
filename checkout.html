<div class="container-box">
    <div class="form-card">
        <h3>Thông tin giao hàng</h3>
        <form onsubmit="checkout(event)">
            <input type="text" id="ship-name" placeholder="Tên người nhận" required style="width:100%; padding:10px; margin-bottom:10px;">
            <input type="text" id="ship-phone" placeholder="Số điện thoại" required style="width:100%; padding:10px; margin-bottom:10px;">
            <button type="submit" class="action-btn btn-primary" style="width:100%">Xác nhận đặt hàng</button>
        </form>
    </div>
    <div class="form-card" id="cart-list"></div>
</div>

<script>
    function render() {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let html = '';
        cart.forEach((item, index) => {
            html += `
            <div class="ios-list-item">
                <span>${item.name}</span>
                <div>
                    <button onclick="changeQty(${index}, -1)">-</button>
                    <span>${item.qty}</span>
                    <button onclick="changeQty(${index}, 1)">+</button>
                    <button onclick="del(${index})" style="color:red">Xóa</button>
                </div>
            </div>`;
        });
        document.getElementById('cart-list').innerHTML = html;
    }
    function changeQty(idx, delta) {
        let cart = JSON.parse(localStorage.getItem('cart'));
        cart[idx].qty += delta;
        if(cart[idx].qty < 1) cart.splice(idx, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        render();
    }
    render();
</script>
