<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Song Thịnh | Logistics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <a href="index.html" class="logo">Song Thịnh <span>Vật Tư</span></a>
        <div class="header-actions">
            <button id="user-status-area" class="user-status-btn" onclick="openAuthModal()"><i class="far fa-user-circle"></i> Đăng nhập</button>
            <a href="admin.html" id="admin-link-btn" class="action-btn" style="display:none; color:var(--ios-danger);"><i class="fas fa-shield-halved"></i> Admin</a>
            <a href="checkout.html" class="action-btn btn-primary"><i class="fas fa-cart-shopping"></i> <span id="cart-count">0</span></a>
        </div>
    </header>

    <div id="global-announcement-zone"></div>

    <div class="filter-zone">
        <input type="text" id="search-input" class="search-ios" placeholder="Tìm vật tư..." oninput="renderProducts()">
        <div class="segmented-control">
            <button class="segmented-btn active" onclick="filterCat('all', this)">Tất cả</button>
            <button class="segmented-btn" onclick="filterCat('thep', this)">Thép</button>
            <button class="segmented-btn" onclick="filterCat('catda', this)">Cát & Đá</button>
        </div>
    </div>

    <div class="products-grid" id="products-container"></div>

    <div class="modal-overlay" id="auth-modal" onclick="closeAuthModal()">
        <div class="auth-card" onclick="event.stopPropagation()">
            <h3 style="margin-bottom:20px;">Đăng nhập hệ thống</h3>
            <form onsubmit="handleAuth(event)">
                <div class="form-group"><input type="text" id="login-user" placeholder="Tài khoản" required></div>
                <div class="form-group"><input type="password" id="login-pass" placeholder="Mật khẩu" required></div>
                <button type="submit" class="action-btn btn-primary" style="width:100%">Đăng nhập</button>
            </form>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
